server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/campus_placement
      database: campus_placement
      auto-index-creation: true
  redis:
    host: localhost
    port: 6379
    ssl:
      enabled: false
    timeout: 3000ms
    connect-timeout: 3000ms
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_SMTP_LOGIN}
    password: ${BREVO_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

app:
  mail:
    from: ${BREVO_FROM_EMAIL}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  reset-expiration: ${JWT_RESET_EXPIRATION:900000}

otp:
  expiry-minutes: 10
  max-attempts: 3
  max-resends: 3
  lockout-minutes: 30

reset:
  frontend-base-url: ${RESET_FRONTEND_BASE_URL:http://localhost:5173/reset-password}

logging:
  level:
    com.placement: DEBUG
